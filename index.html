<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent fetch polyfill from throwing Uncaught TypeError in iframe wrapper
      try {
        let originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() { return originalFetch; },
          set(value) { console.warn('Something tried to set window.fetch', value); },
          configurable: true,
        });
      } catch (e) {
        console.error('Failed to hook fetch:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
